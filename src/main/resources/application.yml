spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orders
    password: orders
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

durable:
  store-path: ./durable-executions.json

order:
  fail-probability: 0.0

logging:
  level:
    com.durableexecutor: INFO
    com.example.orderservice: INFO
