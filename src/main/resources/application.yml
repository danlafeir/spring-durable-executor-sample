spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orders
    password: orders
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

durable:
  store-path: ./durable-executions
  dead-letter-path: ./durable-dlq
  dlq-endpoint:
    enabled: true

order:
  step-delay-ms: 100   # 10s per step × 3 steps = ~30s per order

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.github.danlafeir.durableexecutor: INFO
    com.example.orderservice: INFO
